name: Deploy to AWS Elastic Beanstalk

on:
    push:
        branches:
            - main
# on:
#     workflow_dispatch:
jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        env:
            ENV: ${{ secrets.ENV || 'prod' }}
            DB_TYPE: ${{ secrets.DB_TYPE || 'postgres' }}
            DB_HOST: ${{ secrets.DB_HOST }}
            DB_PORT: ${{ secrets.DB_PORT || '5432' }}
            DB_USERNAME: ${{ secrets.DB_USERNAME }}
            DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
            DB_DATABASE: ${{ secrets.DB_DATABASE }}
            SALT_ROUNDS: ${{ secrets.SALT_ROUNDS }}
            ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
            REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
            REDIS_HOST: ${{ secrets.REDIS_HOST }}
            REDIS_PORT: ${{ secrets.REDIS_PORT || '6379' }}
            REDIS_INSIGHT_PORT: ${{ secrets.REDIS_INSIGHT_PORT || '5540' }}
            SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
            AWS_REGION: ${{ secrets.AWS_REGION }}
            AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}

        services:
            postgres:
                image: postgres:16-alpine

                env:
                    POSTGRES_USER: ${{ secrets.DB_USERNAME }}
                    POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
                    POSTGRES_DB: ${{ secrets.DB_DATABASE }}
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 5432:5432

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'

            - name: Create Env File
              run: |
                  {
                    echo "ENV=${ENV:-prod}"
                    echo "DB_TYPE=${DB_TYPE:-postgres}"
                    echo "DB_HOST=${DB_HOST}"
                    echo "DB_PORT=${DB_PORT:-5432}"
                    echo "DB_USERNAME=${DB_USERNAME}"
                    echo "DB_PASSWORD=${DB_PASSWORD}"
                    echo "DB_DATABASE=${DB_DATABASE}"
                    echo "DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_DATABASE}?sslmode=require"
                    echo "SALT_ROUNDS=${SALT_ROUNDS}"
                    echo "ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}"
                    echo "REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}"
                    echo "REDIS_HOST=${REDIS_HOST}"
                    echo "REDIS_PORT=${REDIS_PORT:-6379}"
                    echo "REDIS_INSIGHT_PORT=${REDIS_INSIGHT_PORT:-5540}"
                    echo "SESSION_SECRET=${SESSION_SECRET}"
                    echo "AWS_REGION=${AWS_REGION}"
                    echo "AWS_S3_BUCKET=${AWS_S3_BUCKET}"
                  } > .env
                  test -n "${DB_HOST}" && test -n "${DB_USERNAME}" && test -n "${DB_DATABASE}"

            - name: Create Folders
              run: |
                  mkdir -p ./public/movie
                  mkdir -p ./public/temp

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Build Project
              run: npm run build

            - name: Verify build artifact
              run: |
                  test -f dist/src/main.js
                  test -f Procfile
                  grep -q 'dist/src/main.js' Procfile
                  test -d node_modules
                  test -f node_modules/@redis/client/dist/lib/commands/reply-utils.js
                  test -f generated/prisma/prisma/client.js || test -f dist/generated/prisma/prisma/client.js

            - name: Run Prisma Migration (CI validation)
              env:
                  DATABASE_URL: postgresql://${{ secrets.DB_USERNAME }}:${{ secrets.DB_PASSWORD }}@localhost:5432/${{ secrets.DB_DATABASE }}
              run: npm run migration:deploy

            - name: Zip Artifact For Deplyment
              run: zip -r deployment.zip .

            - name: Upload To S3
              env:
                  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  AWS_REGION: ${{ secrets.AWS_REGION }}
                  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
                  S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
              run: |
                  aws s3 cp deployment.zip "s3://${S3_BUCKET}/deployment.zip"

            - name: Deploy to AWS Elastic Beanstalk
              env:
                  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  AWS_REGION: ${{ secrets.AWS_REGION }}
                  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
                  S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
                  VERSION_LABEL: ${{ github.sha }}-${{ github.run_number }}
              run: |
                  aws elasticbeanstalk create-application-version \
                    --application-name NestJS-Project-EB \
                    --version-label "$VERSION_LABEL" \
                    --source-bundle "S3Bucket=${S3_BUCKET},S3Key=deployment.zip"

                  aws elasticbeanstalk update-environment \
                    --application-name NestJS-Project-EB \
                    --environment-name NestJS-Project-EB-env \
                    --version-label "$VERSION_LABEL"
